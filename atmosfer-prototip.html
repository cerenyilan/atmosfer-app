<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Atmosfer — Hava Durumuna Göre Kombin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2B3A;
    --paper:#F3EDE2;
    --paper-2:#EAE2D3;
    --mist:#7F9FB8;
    --gold:#D9A24B;
    --rose:#D2867E;
    --slate:#5C6570;
    --line: rgba(27,43,58,0.12);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .app{max-width:1180px;margin:0 auto;padding:0 24px 80px;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    margin:0 -24px 36px;
    padding:56px 24px 40px;
    background: linear-gradient(160deg, #1B2B3A 0%, #223A4E 45%, #2E4A5E 100%);
    color: var(--paper);
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 500px 200px at 85% 0%, rgba(217,162,75,0.18), transparent 60%),
      radial-gradient(ellipse 400px 260px at 10% 100%, rgba(127,159,184,0.25), transparent 60%);
    pointer-events:none;
  }
  .hero-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    position:relative; z-index:1; flex-wrap:wrap; gap:20px;
  }
  .wordmark{
    font-family:'Fraunces', serif;
    font-size:22px; font-weight:500; letter-spacing:0.02em;
  }
  .wordmark span{ color: var(--gold); font-style:italic; }
  .tabs{ display:flex; gap:4px; }
  .tab-btn{
    background:transparent; border:none; cursor:pointer;
    font-family:'Space Mono', monospace; font-size:12px; letter-spacing:0.03em;
    color: rgba(243,237,226,0.55);
    padding:8px 14px; border-radius: 20px;
    display:flex; align-items:center; gap:7px;
    transition: all .15s ease;
  }
  .tab-btn:hover{ color: rgba(243,237,226,0.9); }
  .tab-btn.active{ background: rgba(243,237,226,0.14); color: var(--paper); }
  .tab-count{
    background: var(--gold); color: var(--ink);
    font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px;
    min-width:16px; text-align:center;
  }
  .tab-btn:not(.active) .tab-count{ background: rgba(243,237,226,0.25); color: var(--paper); }

  .locate-form{
    display:flex; gap:8px; align-items:center;
  }
  .locate-form input{
    background: rgba(243,237,226,0.08);
    border:1px solid rgba(243,237,226,0.28);
    color: var(--paper);
    padding:9px 12px;
    font-family:'Space Mono', monospace;
    font-size:12.5px;
    border-radius: var(--radius);
    width:150px;
  }
  .locate-form input::placeholder{ color: rgba(243,237,226,0.45); }
  .locate-form button, .geo-btn{
    background: transparent;
    border:1px solid rgba(243,237,226,0.4);
    color: var(--paper);
    padding:9px 14px;
    font-family:'Space Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    border-radius: var(--radius);
    cursor:pointer;
    transition: all .15s ease;
    white-space:nowrap;
  }
  .locate-form button:hover, .geo-btn:hover{ background: rgba(243,237,226,0.12); }

  .hero-main{
    position:relative; z-index:1;
    display:flex; align-items:flex-end; gap:36px;
    margin-top:44px; flex-wrap:wrap;
  }
  .temp-readout{
    font-family:'Space Mono', monospace;
    font-size:76px; font-weight:700; line-height:0.85;
    letter-spacing:-0.02em;
  }
  .temp-readout sup{ font-size:28px; font-weight:400; top:-0.6em; }
  .hero-copy{ max-width:480px; padding-bottom:6px; }
  .hero-condition{
    font-family:'Fraunces', serif; font-style:italic; font-weight:400;
    font-size:26px; margin:0 0 8px;
  }
  .hero-note{ font-size:14.5px; color: rgba(243,237,226,0.72); line-height:1.55; margin:0; }
  .hero-meta{
    font-family:'Space Mono', monospace; font-size:11px;
    color: rgba(243,237,226,0.55);
    margin-top:14px; display:flex; gap:18px; letter-spacing:0.03em;
  }
  .status-msg{
    font-family:'Space Mono', monospace; font-size:12px;
    color: rgba(243,237,226,0.65); margin-top:44px;
  }

  /* ---------- FILTERS ---------- */
  .weekly{ margin: 34px 0 6px; }
  .weekly-row{
    display:grid; grid-template-columns: repeat(5, 1fr); gap:12px;
  }
  @media (max-width:820px){ .weekly-row{ grid-template-columns: repeat(3, 1fr); } }
  @media (max-width:520px){ .weekly-row{ grid-template-columns: repeat(2, 1fr); } }
  .day-card{
    background:#fff; border:1px solid var(--line); border-radius: var(--radius);
    padding:14px 12px; cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    display:flex; flex-direction:column; gap:8px;
  }
  .day-card:hover{ transform: translateY(-2px); box-shadow: 0 8px 20px rgba(27,43,58,0.1); }
  .day-card.today{ border-color: var(--gold); background: linear-gradient(180deg, #fff 0%, #FBF6EC 100%); }
  .day-name{
    font-family:'Space Mono', monospace; font-size:10.5px; letter-spacing:0.04em;
    text-transform:uppercase; color: var(--slate);
  }
  .day-card.today .day-name{ color: var(--gold); font-weight:700; }
  .day-thumb{ width:100%; border-radius:2px; overflow:hidden; background:var(--paper-2); position:relative; }
  .day-thumb svg{ display:block; width:100%; }
  .day-thumb img{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; opacity:0; transition:opacity .35s ease;
  }
  .day-thumb img.loaded{ opacity:1; }
  .day-temp{
    font-family:'Space Mono', monospace; font-size:13px; color: var(--ink);
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .day-temp span.max{ font-weight:700; }
  .day-temp span.min{ color: var(--slate); }
  .day-outfit-title{
    font-family:'Fraunces', serif; font-size:12.5px; font-weight:500;
    line-height:1.3; color: var(--ink);
  }

  .filters{
    display:flex; gap:8px; flex-wrap:wrap;
    padding: 10px 0;
  }
  #filters{ padding-top:22px; }
  #occasionFilters{
    padding-bottom:26px;
    border-bottom:1px solid var(--line);
    margin-bottom:30px;
  }
  .chip{
    font-family:'Space Mono', monospace;
    font-size:11.5px; letter-spacing:0.03em; text-transform:uppercase;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius: 20px;
    background: transparent;
    color: var(--slate);
    cursor:pointer;
    transition: all .15s ease;
  }
  .chip:hover{ border-color: var(--ink); color:var(--ink); }
  .chip.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  #occasionFilters .chip.active{ background: var(--gold); color: var(--ink); border-color: var(--gold); }

  .section-label{
    font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.08em;
    text-transform:uppercase; color: var(--slate); margin-bottom:18px;
  }

  /* ---------- GRID ---------- */
  .grid{
    column-count:4; column-gap:18px;
  }
  @media (max-width:980px){ .grid{ column-count:3; } }
  @media (max-width:700px){ .grid{ column-count:2; } .hero-main{gap:20px;} .temp-readout{font-size:58px;} }
  @media (max-width:480px){ .grid{ column-count:1; } }

  .card{
    break-inside: avoid;
    margin-bottom:18px;
    background: #fff;
    border:1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
    position:relative;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{ transform: translateY(-2px); box-shadow: 0 10px 24px rgba(27,43,58,0.1); }
  .card-art{ width:100%; display:block; background: var(--paper-2); position:relative; overflow:hidden; }
  .card-art .placeholder-svg{ display:block; width:100%; }
  .card-art img{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; opacity:0; transition:opacity .35s ease;
  }
  .card-art img.loaded{ opacity:1; }
  .photo-credit{
    position:absolute; bottom:8px; left:10px;
    font-family:'Space Mono', monospace; font-size:9px; letter-spacing:0.02em;
    color:rgba(255,255,255,0.9); text-shadow:0 1px 3px rgba(0,0,0,0.55);
    opacity:0; transition:opacity .35s ease; z-index:2;
  }
  .photo-credit.loaded{ opacity:1; }
  .photo-credit a{ color:inherit; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.5); }
  .save-btn{
    position:absolute; top:10px; right:10px;
    width:30px; height:30px;
    border-radius:50%;
    border:none;
    background: rgba(27,43,58,0.55);
    color:#fff;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
    backdrop-filter: blur(2px);
    transition: background .15s ease, transform .15s ease;
  }
  .save-btn:hover{ transform: scale(1.08); }
  .save-btn.saved{ background: var(--rose); }
  .card-body{ padding:14px 16px 16px; }
  .card-tag{
    font-family:'Space Mono', monospace; font-size:10.5px;
    color: var(--slate);
    display:inline-flex; align-items:center; gap:6px;
    letter-spacing:0.02em;
    margin-bottom:8px;
  }
  .card-tag::before{ content:"—"; color: var(--gold); }
  .card-title{
    font-family:'Fraunces', serif; font-weight:500; font-size:16.5px;
    margin:0 0 4px; line-height:1.25;
  }
  .card-note{
    font-family:'Fraunces', serif; font-style:italic; font-weight:400;
    font-size:13px; color: var(--slate); margin:0; line-height:1.45;
  }

  .empty{
    font-family:'Space Mono', monospace; font-size:12.5px; color: var(--slate);
    padding:40px 0; text-align:center;
  }

  footer{
    margin-top:50px; padding-top:20px; border-top:1px solid var(--line);
    font-family:'Space Mono', monospace; font-size:10.5px; color: var(--slate);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="hero">
    <div class="hero-top">
      <div class="wordmark">atmosfer<span>.</span></div>
      <nav class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="discover">Keşfet</button>
        <button class="tab-btn" data-tab="board">Panom <span class="tab-count" id="savedCount">0</span></button>
      </nav>
      <div>
        <div class="locate-form">
          <input id="cityInput" type="text" placeholder="şehir yaz…">
          <button id="citySubmit">Ara</button>
          <button class="geo-btn" id="geoBtn">📍 Konumum</button>
        </div>
      </div>
    </div>

    <div id="heroWeather">
      <div class="hero-main" id="heroMain" style="display:none;">
        <div class="temp-readout" id="tempReadout">—°</div>
        <div class="hero-copy">
          <p class="hero-condition" id="heroCondition">Hava durumu bekleniyor</p>
          <p class="hero-note" id="heroNote"></p>
          <div class="hero-meta" id="heroMeta"></div>
        </div>
      </div>
      <p class="status-msg" id="statusMsg">Bir şehir yaz ya da konumunu paylaş — bugüne özel kombinleri çıkaralım.</p>
    </div>
  </div>

  <section class="weekly" id="weeklySection" style="display:none;">
    <p class="section-label">Haftalık kombin planı</p>
    <div class="weekly-row" id="weeklyRow"></div>
  </section>

  <div class="filters" id="filters"></div>
  <div class="filters" id="occasionFilters"></div>

  <p class="section-label" id="gridLabel">Tüm kombinler</p>
  <div class="grid" id="grid"></div>

  <footer>
    <span>atmosfer — hava + stil günlüğü</span>
    <span>veri: open-meteo.com</span>
  </footer>
</div>

<script>
/* ---------------------------------------------------------
   WARDROBE PALETTE — giysi illüstrasyonları için ayrı ton seti
--------------------------------------------------------- */
const WARDROBE = {
  charcoal: '#3A3F45', camel: '#C6A26B', cream: '#EFE7D8', forest: '#3F5744',
  burgundy: '#7A3B3F', denim: '#4A6478', stone: '#9B9186', black: '#232323',
  rust: '#B5643C', olive: '#6B7052', blush: '#D8AFAE', ivory: '#F6F1E7'
};

/* ---------------------------------------------------------
   SVG GARMENT TEMPLATES — flat-lay illustration style
--------------------------------------------------------- */
function svgWrap(inner, bg){
  return `<svg viewBox="0 0 260 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;background:${bg}">${inner}</svg>`;
}
function tag(x,y,text){
  return `<g font-family="Space Mono, monospace" font-size="9" fill="#5C6570">
    <rect x="${x}" y="${y-11}" width="${text.length*5.6+12}" height="16" fill="#F3EDE2" stroke="#1B2B3A" stroke-opacity="0.15"/>
    <text x="${x+6}" y="${y}">${text}</text></g>`;
}
function coat(c1,c2){
  return svgWrap(`
    <rect x="70" y="40" width="120" height="150" rx="14" fill="${c1}"/>
    <path d="M70 55 L40 100 L55 190 L80 175 L80 60 Z" fill="${c1}"/>
    <path d="M190 55 L220 100 L205 190 L180 175 L180 60 Z" fill="${c1}"/>
    <path d="M100 40 L130 70 L160 40 L150 30 L130 45 L110 30 Z" fill="${c2}"/>
    <rect x="122" y="80" width="16" height="90" fill="${c2}" opacity="0.35"/>
    <circle cx="130" cy="95" r="3" fill="${c2}"/><circle cx="130" cy="115" r="3" fill="${c2}"/>
    <circle cx="130" cy="135" r="3" fill="${c2}"/><circle cx="130" cy="155" r="3" fill="${c2}"/>
    <rect x="95" y="200" width="30" height="70" rx="6" fill="#3A3F45"/>
    <rect x="135" y="200" width="30" height="70" rx="6" fill="#3A3F45"/>
    ${tag(14,282,'wool · -2°/6°C')}
  `, WARDROBE.ivory);
}
function trench(c1,c2){
  return svgWrap(`
    <path d="M75 45 L185 45 L195 195 L165 180 L165 260 L95 260 L95 180 L65 195 Z" fill="${c1}"/>
    <path d="M75 45 L45 90 L60 130 L85 100 Z" fill="${c1}"/>
    <path d="M185 45 L215 90 L200 130 L175 100 Z" fill="${c1}"/>
    <rect x="70" y="150" width="120" height="10" fill="${c2}"/>
    <circle cx="90" cy="120" r="2.6" fill="${c2}"/><circle cx="90" cy="140" r="2.6" fill="${c2}"/>
    <circle cx="90" cy="160" r="2.6" fill="${c2}"/>
    <circle cx="170" cy="120" r="2.6" fill="${c2}"/><circle cx="170" cy="140" r="2.6" fill="${c2}"/>
    <path d="M108 45 L130 65 L152 45 L145 35 L130 42 L115 35 Z" fill="#EFE7D8"/>
    <rect x="60" y="260" width="140" height="16" rx="8" fill="#3A3F45"/>
    ${tag(14,282,'gabardin · 9°/15°C')}
  `, WARDROBE.ivory);
}
function knit(c1,c2){
  return svgWrap(`
    <path d="M85 50 Q130 35 175 50 L190 95 L165 105 L165 200 L95 200 L95 105 L70 95 Z" fill="${c1}"/>
    <line x1="95" y1="60" x2="95" y2="195" stroke="${c2}" stroke-width="1.4" opacity="0.4"/>
    <line x1="115" y1="55" x2="115" y2="198" stroke="${c2}" stroke-width="1.4" opacity="0.4"/>
    <line x1="145" y1="55" x2="145" y2="198" stroke="${c2}" stroke-width="1.4" opacity="0.4"/>
    <line x1="165" y1="60" x2="165" y2="195" stroke="${c2}" stroke-width="1.4" opacity="0.4"/>
    <rect x="100" y="205" width="60" height="70" rx="4" fill="${WARDROBE.denim}"/>
    <line x1="130" y1="205" x2="130" y2="275" stroke="#2E4A5E" stroke-width="2"/>
    <rect x="60" y="240" width="24" height="14" rx="3" fill="#3A3F45"/>
    <rect x="176" y="240" width="24" height="14" rx="3" fill="#3A3F45"/>
    ${tag(14,290,'triko · 10°/16°C')}
  `, WARDROBE.ivory);
}
function rain(c1,c2){
  return svgWrap(`
    <path d="M78 55 L182 55 L192 190 L68 190 Z" fill="${c1}"/>
    <path d="M78 55 L50 95 L65 130 L88 105 Z" fill="${c1}"/>
    <path d="M182 55 L210 95 L195 130 L172 105 Z" fill="${c1}"/>
    <rect x="122" y="70" width="16" height="115" fill="${c2}" opacity="0.4"/>
    <path d="M60 30 Q130 5 200 30 L200 40 Q130 20 60 40 Z" fill="${c2}"/>
    <line x1="130" y1="30" x2="130" y2="55" stroke="${c2}" stroke-width="3"/>
    <rect x="92" y="200" width="26" height="65" rx="6" fill="#232323"/>
    <rect x="142" y="200" width="26" height="65" rx="6" fill="#232323"/>
    ${tag(14,282,'su geçirmez · yağmurlu')}
  `, WARDROBE.ivory);
}
function summer(c1,c2){
  return svgWrap(`
    <path d="M100 45 L160 45 L175 90 L155 250 L105 250 L85 90 Z" fill="${c1}"/>
    <path d="M100 45 L75 70 L90 90 L108 65 Z" fill="${c1}"/>
    <path d="M160 45 L185 70 L170 90 L152 65 Z" fill="${c1}"/>
    <circle cx="130" cy="60" r="12" fill="${c2}" opacity="0.5"/>
    <path d="M90 130 L170 130" stroke="${c2}" stroke-width="2" opacity="0.5"/>
    <path d="M85 170 L175 170" stroke="${c2}" stroke-width="2" opacity="0.5"/>
    <ellipse cx="95" cy="268" rx="20" ry="8" fill="#C6A26B"/>
    <ellipse cx="165" cy="268" rx="20" ry="8" fill="#C6A26B"/>
    <rect x="70" y="20" width="46" height="16" rx="8" fill="#232323"/>
    ${tag(14,282,'keten · 24°/31°C')}
  `, WARDROBE.ivory);
}
function layer(c1,c2){
  return svgWrap(`
    <rect x="90" y="90" width="80" height="100" rx="10" fill="${c2}"/>
    <path d="M75 45 L185 45 L198 100 L170 115 L170 195 L90 195 L90 115 L62 100 Z" fill="${c1}"/>
    <rect x="120" y="45" width="20" height="150" fill="${c2}" opacity="0.3"/>
    <rect x="100" y="205" width="60" height="70" rx="6" fill="#4A6478"/>
    <rect x="65" y="235" width="130" height="14" rx="4" fill="#3A3F45"/>
    ${tag(14,290,'katmanlı · 16°/21°C')}
  `, WARDROBE.ivory);
}
function business(c1,c2){
  return svgWrap(`
    <path d="M80 50 L180 50 L190 92 L165 82 L165 132 L95 132 L95 82 L70 92 Z" fill="${c1}"/>
    <path d="M80 50 L58 78 L74 102 L95 82 Z" fill="${c1}"/>
    <path d="M180 50 L202 78 L186 102 L165 82 Z" fill="${c1}"/>
    <path d="M112 50 L130 68 L148 50 L140 41 L130 48 L120 41 Z" fill="${c2}"/>
    <rect x="122" y="68" width="16" height="58" fill="${c2}" opacity="0.3"/>
    <rect x="93" y="142" width="74" height="92" rx="4" fill="#2E3338"/>
    <line x1="130" y1="142" x2="130" y2="234" stroke="#1B1E21" stroke-width="2"/>
    <rect x="68" y="244" width="36" height="15" rx="3" fill="${c2}"/>
    <rect x="156" y="244" width="36" height="15" rx="3" fill="#2E3338"/>
    ${tag(14,282,'ofis')}
  `, WARDROBE.ivory);
}
function sport(c1,c2){
  return svgWrap(`
    <path d="M85 55 L175 55 L190 100 L163 113 L163 176 L97 176 L97 113 L70 100 Z" fill="${c1}"/>
    <rect x="119" y="55" width="22" height="121" fill="${c2}" opacity="0.4"/>
    <circle cx="150" cy="72" r="4" fill="${c2}"/>
    <path d="M85 55 L60 70 L70 92 L92 78 Z" fill="${c2}"/>
    <path d="M175 55 L200 70 L190 92 L168 78 Z" fill="${c2}"/>
    <rect x="99" y="186" width="62" height="82" rx="22" fill="#232323"/>
    <line x1="130" y1="186" x2="130" y2="268" stroke="${c2}" stroke-width="3"/>
    <ellipse cx="88" cy="282" rx="24" ry="11" fill="#F6F1E7"/>
    <ellipse cx="172" cy="282" rx="24" ry="11" fill="#F6F1E7"/>
    <ellipse cx="88" cy="282" rx="24" ry="11" fill="none" stroke="${c1}" stroke-width="2"/>
    <ellipse cx="172" cy="282" rx="24" ry="11" fill="none" stroke="${c1}" stroke-width="2"/>
    ${tag(14,296,'spor')}
  `, WARDROBE.ivory);
}
function evening(c1,c2){
  return svgWrap(`
    <path d="M105 45 L155 45 L172 105 L150 262 L110 262 L88 105 Z" fill="${c1}"/>
    <path d="M105 45 L86 64 L100 84 L113 62 Z" fill="${c1}"/>
    <path d="M155 45 L174 64 L160 84 L147 62 Z" fill="${c1}"/>
    <circle cx="130" cy="58" r="10" fill="${c2}" opacity="0.65"/>
    <path d="M94 152 Q130 163 166 152" stroke="${c2}" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M94 180 Q130 191 166 180" stroke="${c2}" stroke-width="1.4" fill="none" opacity="0.4"/>

const PEXELS_KEY = 'nVyFy7SONg4NsLv6Z1e0x28ffAZ8Xz3TbIZi20bAoc5ODLNeIZHKHfp9';
const photoCache = new Map(); // query -> {url, photographer, photographer_url} | null

async function fetchPexelsPhoto(query){
  if(photoCache.has(query)) return photoCache.get(query);
  try{
    const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1&orientation=portrait`, {
      headers: { Authorization: PEXELS_KEY }
    });
    if(!res.ok){ photoCache.set(query, null); return null; }
    const data = await res.json();
    const photo = data.photos && data.photos[0];
    const result = photo ? {
      url: photo.src.medium,
      photographer: photo.photographer,
      photographer_url: photo.photographer_url
    } : null;
    photoCache.set(query, result);
    return result;
  }catch(e){
    photoCache.set(query, null);
    return null;
  }
}

function loadThumbPhoto(thumbEl, query){
  fetchPexelsPhoto(query).then(result=>{
    if(!result || !thumbEl.isConnected) return;
    const img = new Image();
    img.src = result.url;
    img.alt = query;
    img.onload = ()=>{
      thumbEl.appendChild(img);
      requestAnimationFrame(()=> img.classList.add('loaded'));
    };
  });
}

function loadCardPhoto(cardArtEl, query){
  fetchPexelsPhoto(query).then(result=>{
    if(!result || !cardArtEl.isConnected) return;
    const img = new Image();
    img.src = result.url;
    img.alt = query;
    img.onload = ()=>{
      cardArtEl.appendChild(img);
      requestAnimationFrame(()=> img.classList.add('loaded'));
      const credit = document.createElement('div');
      credit.className = 'photo-credit';
      credit.innerHTML = `📷 <a href="${result.photographer_url}" target="_blank" rel="noopener">${result.photographer}</a>`;
      cardArtEl.appendChild(credit);
      requestAnimationFrame(()=> credit.classList.add('loaded'));
    };
  });
}

function renderGrid(highlightCat){
  const grid = document.getElementById('grid');
  const label = document.getElementById('gridLabel');
  const filtersEl = document.getElementById('filters');
  const occasionFiltersEl = document.getElementById('occasionFilters');
  const heroWeatherEl = document.getElementById('heroWeather');
  const weeklyEl = document.getElementById('weeklySection');
  const weeklyHasData = weeklyEl.dataset.loaded === 'true';

  let items;

  if(state.activeTab === 'board'){
    heroWeatherEl.style.display = 'none';
    filtersEl.style.display = 'none';
    occasionFiltersEl.style.display = 'none';
    weeklyEl.style.display = 'none';
    items = LIBRARY.filter(i => state.saved.has(i.id));
    label.textContent = items.length
      ? `panom · ${items.length} kombin`
      : 'panom';
    if(items.length === 0){
      grid.innerHTML = `<p class="empty">henüz bir şey kaydetmedin — kalp ikonuna basarak Keşfet'ten kombin ekleyebilirsin</p>`;
      return;
    }
  } else {
    heroWeatherEl.style.display = '';
    filtersEl.style.display = '';
    occasionFiltersEl.style.display = '';
    if(weeklyHasData) weeklyEl.style.display = 'block';
    items = LIBRARY;
    if(state.activeFilter !== 'all'){
      items = items.filter(i => i.cat === state.activeFilter);
    }
    if(state.activeOccasion !== 'all'){
      items = items.filter(i => i.occasion === state.activeOccasion);
    }
    const weatherLabel = state.activeFilter === 'all' ? null : FILTERS.find(f=>f.key===state.activeFilter).label;
    const occasionLabel = state.activeOccasion === 'all' ? null : OCCASIONS.find(f=>f.key===state.activeOccasion).label;
    if(!weatherLabel && !occasionLabel){
      label.textContent = highlightCat ? `bugüne göre önerilenler önce · tüm kombinler` : 'tüm kombinler';
    } else {
      label.textContent = [occasionLabel, weatherLabel].filter(Boolean).join(' · ') + ' kombinler';
    }

    if(highlightCat && state.activeFilter === 'all'){
      items = [...items].sort((a,b)=> (a.cat===highlightCat?-1:0) - (b.cat===highlightCat?-1:0));
    }
    if(items.length === 0){
      grid.innerHTML = `<p class="empty">bu kombinasyonda henüz kombin yok</p>`;
      return;
    }
  }

  grid.innerHTML = items.map((item) => {
    const artSvg = TEMPLATES[item.tpl](item.c[0], item.c[1]);
    const isSaved = state.saved.has(item.id);
    return `
      <div class="card">
        <div class="card-art" data-query="${item.query}">
          ${artSvg.replace('<svg ', '<svg class="placeholder-svg" ')}
        </div>
        <button class="save-btn ${isSaved?'saved':''}" data-id="${item.id}">${isSaved?'♥':'♡'}</button>
        <div class="card-body">
          <div class="card-tag">${item.wtag}</div>
          <p class="card-title">${item.title}</p>
          <p class="card-note">${item.note}</p>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.save-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      if(state.saved.has(id)){
        state.saved.delete(id); btn.classList.remove('saved'); btn.textContent='♡';
      } else {
        state.saved.add(id); btn.classList.add('saved'); btn.textContent='♥';
      }
      updateSavedCount();
      if(state.activeTab === 'board'){
        // panomdan çıkarıldıysa kartı kaybolarak listeden kaldır
        renderGrid();
      }
    });
  });

  grid.querySelectorAll('.card-art').forEach(el=>{
    loadCardPhoto(el, el.dataset.query);
  });
}

function renderTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
    btn.onclick = ()=>{
      state.activeTab = btn.dataset.tab;
      renderTabs();
      renderGrid();
    };
  });
}

function categoryFromWeather(tempC, code){
  const rain = [51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code);
  const snow = [71,73,75,77,85,86].includes(code);
  if(snow || tempC < 0) return 'karli';
  if(rain) return 'yagmurlu';
  if(tempC < 9) return 'soguk';
  if(tempC < 15) return 'serin';
  if(tempC < 21) return 'iliman';
  return 'sicak';
}
function conditionLabel(code){
  if([0].includes(code)) return 'Açık gökyüzü';
  if([1,2].includes(code)) return 'Parçalı bulutlu';
  if([3].includes(code)) return 'Kapalı';
  if([45,48].includes(code)) return 'Sisli';
  if([51,53,55,56,57].includes(code)) return 'Çiseleyen yağmur';
  if([61,63,65,66,67,80,81,82].includes(code)) return 'Yağmurlu';
  if([71,73,75,77,85,86].includes(code)) return 'Karlı';
  if([95,96,99].includes(code)) return 'Gök gürültülü sağanak';
  return 'Değişken';
}
function editorialNote(cat){
  const notes = {
    karli: 'Bugün her katman bir karar. Sıcak tut, sade kal.',
    soguk: 'Hava sertleşiyor, kumaş kalınlaşıyor. Palto günü.',
    serin: 'Ne çok kalın ne çok ince — trençkot mevsimi.',
    iliman: 'Sabah-akşam farkı var, tek parça yetmez.',
    sicak: 'Kumaş hafiflesin, renkler açılsın.',
    yagmurlu: 'Şemsiyeyi unutma, ayakkabı su görmesin.'
  };
  return notes[cat] || '';
}

async function fetchWeatherByCoords(lat, lon, label){
  setStatus('Hava durumu okunuyor…');
  try{
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&forecast_days=5&timezone=auto`);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    showWeather(temp, code, label);
    if(data.daily) renderWeeklyPlan(data.daily);
  }catch(e){
    setStatus('Hava durumu alınamadı. Bağlantını kontrol edip tekrar dene.');
  }
}

async function fetchWeatherByCity(city){
  setStatus('“'+city+'” aranıyor…');
  try{
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=tr`);
    const geoData = await geoRes.json();
    if(!geoData.results || geoData.results.length===0){
      setStatus('Şehir bulunamadı, tekrar dene.');
      return;
    }
    const r = geoData.results[0];
    fetchWeatherByCoords(r.latitude, r.longitude, r.name + (r.admin1 ? ', '+r.admin1 : ''));
  }catch(e){
    setStatus('Arama sırasında bir sorun oluştu.');
  }
}

function setStatus(msg){
  document.getElementById('statusMsg').style.display = 'block';
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('heroMain').style.display = 'none';
}

function showWeather(temp, code, place){
  const cat = categoryFromWeather(temp, code);
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('heroMain').style.display = 'flex';
  document.getElementById('tempReadout').innerHTML = `${temp}<sup>°C</sup>`;
  document.getElementById('heroCondition').textContent = conditionLabel(code);
  document.getElementById('heroNote').textContent = editorialNote(cat);
  document.getElementById('heroMeta').innerHTML = `<span>${place || 'konumun'}</span><span>${new Date().toLocaleDateString('tr-TR',{weekday:'long', day:'numeric', month:'long'})}</span>`;
  renderGrid(cat);
}

function pickOutfitForCategory(cat, seed){
  const pool = LIBRARY.filter(i => i.cat === cat && i.occasion === 'gunluk');
  const fallback = pool.length ? pool : LIBRARY.filter(i => i.cat === cat);
  if(fallback.length === 0) return LIBRARY[0];
  return fallback[seed % fallback.length];
}

function renderWeeklyPlan(daily){
  const section = document.getElementById('weeklySection');
  const row = document.getElementById('weeklyRow');
  const days = daily.time.map((dateStr, i) => ({
    date: new Date(dateStr + 'T00:00:00'),
    tempMax: Math.round(daily.temperature_2m_max[i]),
    tempMin: Math.round(daily.temperature_2m_min[i]),
    code: daily.weather_code[i],
  }));

  const rotationSeed = Math.floor(Math.random() * 97);
  row.innerHTML = days.map((d, i) => {
    const cat = categoryFromWeather(d.tempMax, d.code);
    const outfit = pickOutfitForCategory(cat, rotationSeed + i);
    const artSvg = TEMPLATES[outfit.tpl](outfit.c[0], outfit.c[1]);
    const isToday = i === 0;
    const dayLabel = isToday ? 'Bugün' : d.date.toLocaleDateString('tr-TR', {weekday:'short'});
    const dateLabel = d.date.toLocaleDateString('tr-TR', {day:'numeric', month:'short'});
    return `
      <div class="day-card ${isToday?'today':''}" data-cat="${cat}">
        <div class="day-name">${dayLabel} · ${dateLabel}</div>
        <div class="day-thumb" data-query="${outfit.query}">${artSvg}</div>
        <div class="day-temp"><span class="max">${d.tempMax}°</span><span class="min">${d.tempMin}°</span></div>
        <div class="day-outfit-title">${outfit.title}</div>
      </div>
    `;
  }).join('');

  row.querySelectorAll('.day-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      const cat = card.dataset.cat;
      state.activeFilter = cat;
      state.activeOccasion = 'all';
      renderFilters();
      renderOccasionFilters();
      renderGrid();
      document.getElementById('gridLabel').scrollIntoView({behavior:'smooth', block:'start'});
    });
  });

  row.querySelectorAll('.day-thumb').forEach(el=>{
    loadThumbPhoto(el, el.dataset.query);
  });

  section.dataset.loaded = 'true';
  section.style.display = 'block';
}

/* ---------------------------------------------------------
   EVENTS
--------------------------------------------------------- */
document.getElementById('geoBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){ setStatus('Tarayıcın konum servisini desteklemiyor.'); return; }
  setStatus('Konum isteniyor…');
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude, 'Konumun'),
    ()=> setStatus('Konum paylaşılmadı. Şehir adıyla da arayabilirsin.')
  );
});
document.getElementById('citySubmit').addEventListener('click', ()=>{
  const v = document.getElementById('cityInput').value.trim();
  if(v) fetchWeatherByCity(v);
});
document.getElementById('cityInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ const v = e.target.value.trim(); if(v) fetchWeatherByCity(v); }
});

/* ---------------------------------------------------------
   INIT
--------------------------------------------------------- */
renderFilters();
renderOccasionFilters();
renderTabs();
updateSavedCount();
renderGrid();
</script>
